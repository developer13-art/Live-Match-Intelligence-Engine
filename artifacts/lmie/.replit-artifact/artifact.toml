kind = "web"
previewPath = "/"
title = "Live Match Intelligence Engine"
version = "1.0.0"
id = "artifacts/lmie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21591

[services.development]
run = "pnpm --filter @workspace/lmie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lmie", "run", "build" ]
publicDir = "artifacts/lmie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21591"
BASE_PATH = "/"
